<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #080b12;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      position: relative;
    }

    /* Grid overlay */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.05) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 90% 90% at 50% 50%, black, transparent);
      pointer-events: none;
    }

    /* Glow blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
    }
    .blob-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(0,212,255,0.22) 0%, transparent 70%);
      top: -150px; left: -100px;
    }
    .blob-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(123,92,240,0.2) 0%, transparent 70%);
      bottom: -120px; right: -80px;
    }

    /* Top accent line */
    .accent-line {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #00d4ff 30%, #7b5cf0 70%, transparent);
    }

    /* Main layout */
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 70px;
      padding: 0 80px;
      width: 100%;
    }

    /* Photo */
    .photo-wrap {
      flex-shrink: 0;
      position: relative;
      width: 220px;
      height: 220px;
    }

    .photo-wrap::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(#00d4ff, #7b5cf0, #00d4ff);
      z-index: -1;
      filter: blur(10px);
      opacity: 0.7;
    }

    .photo {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      border: 2.5px solid rgba(0,212,255,0.5);
      box-shadow:
        0 0 0 5px rgba(0,212,255,0.08),
        0 0 50px rgba(0,212,255,0.3),
        0 20px 60px rgba(0,0,0,0.7);
      display: block;
    }

    /* Text */
    .text {
      flex: 1;
    }

    .eyebrow {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(0,212,255,0.7);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .eyebrow::before {
      content: '';
      display: block;
      width: 28px; height: 1px;
      background: rgba(0,212,255,0.6);
    }

    .name {
      font-size: 72px;
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
      color: #fff;
      margin-bottom: 16px;
    }

    .name span {
      background: linear-gradient(135deg, #00d4ff 0%, #7b5cf0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .title {
      font-size: 22px;
      font-weight: 500;
      color: #00d4ff;
      letter-spacing: 0.01em;
      margin-bottom: 20px;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, rgba(0,212,255,0.5), transparent);
      margin-bottom: 20px;
    }

    .tagline {
      font-size: 26px;
      font-weight: 700;
      color: #6b7a99;
      letter-spacing: -0.01em;
    }

    .tagline em {
      font-style: normal;
      color: #a0b0cc;
    }

    /* URL badge */
    .url-badge {
      position: absolute;
      bottom: 32px;
      right: 80px;
      font-size: 13px;
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      color: rgba(0,212,255,0.45);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="accent-line"></div>

  <div class="content">
    <div class="photo-wrap">
      <img src="Headshot.jpg" alt="Camden Penland" class="photo" />
    </div>

    <div class="text">
      <div class="eyebrow">HR Business Partner</div>
      <h1 class="name"><span>Camden</span> Penland</h1>
      <p class="title">HR Business Partner &nbsp;|&nbsp; AI Strategy</p>
      <div class="divider"></div>
      <p class="tagline"><em>Human Led.</em> AI Charged.</p>
    </div>
  </div>

  <span class="url-badge">camdenpenland.github.io</span>
</body>
</html>
